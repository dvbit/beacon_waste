    entity_category: diagnostic

  # --- b1 ---
  - platform: ble_rssi
    mac_address: "${b1_mac}"
    name: "${b1_mac_id} RSSI"
    filters:
      - sliding_window_moving_average:
          window_size: 10
          send_every: 5
  - platform: template
    name: "${b1_mac_id} Battery"
    id: b1_battery
    device_class: battery
