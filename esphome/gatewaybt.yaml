esp32_ble_tracker:
  scan_parameters:
    window: 300ms
    continuous: true
  on_ble_advertise:
    - mac_address: "${b1_mac}"
      then:
        - lambda: |-
            auto nm = x.get_name();
            if (nm.length() > 0) id(b1_name).publish_state(nm);
    - mac_address: "${b2_mac}"
      then:
        - lambda: |-
            auto nm = x.get_name();
            if (nm.length() > 0) id(b2_name).publish_state(nm);
    - mac_address: "${b3_mac}"
      then:
        - lambda: |-
            auto nm = x.get_name();
            if (nm.length() > 0) id(b3_name).publish_state(nm);
    - mac_address: "${b4_mac}"
      then:
        - lambda: |-
            auto nm = x.get_name();
            if (nm.length() > 0) id(b4_name).publish_state(nm);
    - mac_address: "${b5_mac}"
      then:
        - lambda: |-
            auto nm = x.get_name();
            if (nm.length() > 0) id(b5_name).publish_state(nm);
  on_ble_service_data_advertise:
    - mac_address: "${b1_mac}"
      service_uuid: "5242"
      then:
        - lambda: |-
            if (x.size() < 13) return;
            id(b1_battery).publish_state(x[1]);
            uint8_t pkt = x[10];
            if (pkt == 0x01) {
              id(b1_temp).publish_state((float)x[11] + (float)x[12] / 100.0f);
            } else if (pkt == 0x03) {
              id(b1_hum).publish_state((float)x[11] + (float)x[12] / 100.0f);
            } else if (pkt == 0x04) {
              id(b1_vib).publish_state(x[11] > 0);
            } else if (pkt == 0x06) {
              id(b1_btn).publish_state(x[11] > 0);
            }
    - mac_address: "${b2_mac}"
      service_uuid: "5242"
      then:
        - lambda: |-
            if (x.size() < 13) return;
            id(b2_battery).publish_state(x[1]);
            uint8_t pkt = x[10];
            if (pkt == 0x01) {
              id(b2_temp).publish_state((float)x[11] + (float)x[12] / 100.0f);
            } else if (pkt == 0x03) {
              id(b2_hum).publish_state((float)x[11] + (float)x[12] / 100.0f);
            } else if (pkt == 0x04) {
              id(b2_vib).publish_state(x[11] > 0);
            } else if (pkt == 0x06) {
              id(b2_btn).publish_state(x[11] > 0);
            }
    - mac_address: "${b3_mac}"
      service_uuid: "5242"
      then:
        - lambda: |-
            if (x.size() < 13) return;
            id(b3_battery).publish_state(x[1]);
            uint8_t pkt = x[10];
            if (pkt == 0x01) {
              id(b3_temp).publish_state((float)x[11] + (float)x[12] / 100.0f);
            } else if (pkt == 0x03) {
              id(b3_hum).publish_state((float)x[11] + (float)x[12] / 100.0f);
            } else if (pkt == 0x04) {
              id(b3_vib).publish_state(x[11] > 0);
            } else if (pkt == 0x06) {
              id(b3_btn).publish_state(x[11] > 0);
            }
    - mac_address: "${b4_mac}"
      service_uuid: "5242"
      then:
        - lambda: |-
            if (x.size() < 13) return;
            id(b4_battery).publish_state(x[1]);
            uint8_t pkt = x[10];
            if (pkt == 0x01) {
              id(b4_temp).publish_state((float)x[11] + (float)x[12] / 100.0f);
            } else if (pkt == 0x03) {
              id(b4_hum).publish_state((float)x[11] + (float)x[12] / 100.0f);
            } else if (pkt == 0x04) {
              id(b4_vib).publish_state(x[11] > 0);
            } else if (pkt == 0x06) {
              id(b4_btn).publish_state(x[11] > 0);
            }
    - mac_address: "${b5_mac}"
      service_uuid: "5242"
      then:
        - lambda: |-
            if (x.size() < 13) return;
            id(b5_battery).publish_state(x[1]);
            uint8_t pkt = x[10];
            if (pkt == 0x01) {
              id(b5_temp).publish_state((float)x[11] + (float)x[12] / 100.0f);
            } else if (pkt == 0x03) {
              id(b5_hum).publish_state((float)x[11] + (float)x[12] / 100.0f);
            } else if (pkt == 0x04) {
              id(b5_vib).publish_state(x[11] > 0);
            } else if (pkt == 0x06) {
