esphome:
  name: esp32-bluetooth-proxy-626540
  friendly_name: Bluetooth Proxy 626540
  min_version: 2024.6.0
  name_add_mac_suffix: false

esp32:
  board: esp32dev
  framework:
    type: esp-idf

ethernet:
  type: LAN8720
  mdc_pin: GPIO23
  mdio_pin: GPIO18
  clk_mode: GPIO16_OUT
  phy_addr: 0
  power_pin: GPIO5
  manual_ip:
    static_ip: 192.168.2.166
    gateway: 192.168.2.1
    subnet: 255.255.255.0

web_server:
  port: 80
  version: 3

api:

logger:
  level: DEBUG

ota:
